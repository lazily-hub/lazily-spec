name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lean:
    name: Lean formal model
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Lean formal model
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formal/lean
          auto-config: false
          build: true
          test: false
          lint: false
