name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  schemas:
    name: JSON Schema drift-prevention
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Validate schemas vs conformance fixtures
        run: make test-schemas

  lean:
    name: Lean formal model
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Lean formal model
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formal/lean
          auto-config: false
          build: true
          test: false
          lint: false
